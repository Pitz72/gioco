# BUILD CROSS-PLATFORM — Il Relitto Silente
# Compila automaticamente .exe (Windows), .AppImage (Linux) e .dmg (macOS)
# quando viene pubblicata una release con tag v*
# oppure manualmente dal pannello "Actions" su GitHub.

name: Build Cross-Platform Release

on:
  push:
    tags:
      - 'v*'           # es. git tag v1.2.6 && git push origin v1.2.6
  workflow_dispatch:   # Pulsante manuale su GitHub → Actions

jobs:
  build:
    strategy:
      fail-fast: false   # Se un platform fallisce, gli altri continuano
      matrix:
        include:
          - os: windows-latest
            platform_flag: --win
            artifact_name: windows
            artifact_path: release/*.exe

          - os: ubuntu-latest
            platform_flag: --linux
            artifact_name: linux
            artifact_path: release/*.AppImage

          - os: macos-latest
            platform_flag: --mac
            artifact_name: macos
            artifact_path: release/*.dmg

    runs-on: ${{ matrix.os }}

    steps:
      # 1. Checkout del codice
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js (LTS 22 — stessa versione usata in sviluppo)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. Dipendenze di sistema per Linux (AppImage builder)
      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libnotify-dev \
            libnss3 \
            libxss1 \
            libasound2-dev \
            fakeroot \
            rpm

      # 4. Installa le dipendenze npm
      - name: Install npm dependencies
        run: npm ci

      # 5. Build Vite (frontend React)
      - name: Build frontend (Vite)
        run: npm run build

      # 6. Compila il main process Electron (TypeScript → CommonJS)
      - name: Compile Electron main process
        run: npx tsc -p electron/tsconfig.json

      # 7. Genera dist-electron/package.json (richiesto da electron-builder)
      - name: Run build helper
        run: node electron/build-helper.js

      # 8. Pacchettizza con electron-builder per la piattaforma target
      - name: Package with electron-builder
        run: npx electron-builder ${{ matrix.platform_flag }} --publish never
        env:
          # macOS: disabilita ricerca automatica certificati (build non firmata)
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 9. Carica i file prodotti come artifact del workflow
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: IlRelittoSilente-${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 30

  # ─── Release automatica su GitHub ───────────────────────────────────────
  # Si esegue solo quando il trigger è un tag v* (non su workflow_dispatch)
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      # Scarica tutti gli artifact dai 3 job precedenti
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      # Elenca i file scaricati (utile per debug)
      - name: List artifacts
        run: find artifacts/ -type f | sort

      # Crea la GitHub Release e allega i file
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Il Relitto Silente ${{ github.ref_name }}"
          body: |
            ## Il Relitto Silente ${{ github.ref_name }}

            Avventura testuale fantascientifica ambientata su una nave aliena abbandonata.

            ---

            ### 📥 Download

            | Piattaforma | Formato | Note |
            |---|---|---|
            | 🪟 **Windows** | Installer `.exe` | Installazione guidata |
            | 🐧 **Linux** | `.AppImage` | Eseguibile portabile, nessuna installazione |
            | 🍎 **macOS** | `.dmg` | Drag & Drop in Applicazioni |

            > **Nota macOS:** la build non è firmata con Apple Developer ID certificato.
            > Se macOS blocca l'apertura: **tasto destro → Apri** e conferma.

            ---

            ### 📖 Documentazione
            Il file `LEGGIMI.txt` è incluso nella cartella di installazione.
          files: artifacts/**
          draft: false
          prerelease: false
